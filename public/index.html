<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Za Helenu</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="meet.css">


</head>
<body>



    

<div id="submitted" style="display:none;">

<div class="potvrdeno">
    <section class="status">
        <div class="anim-container text-center success-screen">

            <div class="clover">✔️</div>

            <div class="status-text">
                <span>POTVRĐENO</span>
            </div>

            <div class="status-text">
                <div id="meeting-info"></div>
            </div>

            <div class="status-text">
                <span class="predomislila">
                    <a href="/index.html">Predomislila sam se..</a>
                </span>
            </div>

        </div>
    </section>
</div>

   
    <section class="status active ">
                <div class="anim-container text-center success-screen">
                    <div class="clover">🍀</div>
                    <div class="status-text">
                        <span>Poslano <br><span class="potvrdim"> provjeri malo kasnije</span></span>
                        <span class="dots-loader">
                            <span>.</span><span>.</span><span>.</span>
                        </span>
                    </div>
                    <div class="status-text">
                       <span class="predomislila"><a href="/index.html"> Predomislila sam se..</a> </span>
                    </div>
                </div>
    </section>


</div>


<div id="notSubmitted">

        <div class="container">

            <div class="card">

                <h1>🌸 Za Helenu 🍀</h1>

                <p class="subtitle">

                </p>

                <p class="description">
                    Način da mi se javiš bez pritiska, <br>
                    ako odlučiš razgovarat... 
                </p>

            <button id="startBtn">
                Nastavi
            </button>

            </div>

        </div>


</div>



<script>
document.addEventListener("click", async (e) => {
    if (!e.target.closest(".predomislila")) return;

    console.log("Predomislila se");

    const res = await fetch('/api/reset', { method: 'POST' });
    const data = await res.json();

    if (data.success) {
        await checkStatus(); // IMPORTANT: wait for UI sync
    }
});

document.getElementById("startBtn").addEventListener("click", () => {

    document.body.classList.add("page-leave");

    setTimeout(() => {
        window.location = "meet.html";
    }, 200);

});




function formatMeeting(data) {
    const d = data?.data || {};

    return `
        <div class="meeting-card" style="margin-top:20px;">
            <div>📅 ${d.day || '-'}. lipnja </div>
            <div>🕒 ${d.time || '-'} sati</div>
            <div>📍 &nbsp ${d.location || '-'}</div>
        </div>
    `;
}

function renderMeeting(data) {
    const el = document.getElementById("meeting-info");
    if (!el) return;

    el.innerHTML = formatMeeting(data);
}


async function checkStatus() {
    console.log("CHECKING STATUS...");

    try {
        const res = await fetch('/api/status', { cache: "no-store" });
        const data = await res.json();

        console.log("STATUS RESPONSE:", data);

        if (data.submitted === true) {
            console.log("SHOW SUBMITTED UI");

            document.getElementById('notSubmitted').style.display = 'none';
            document.getElementById('submitted').style.display = 'block';



                                renderMeeting(data);



        } else {
            console.log("SHOW NOT SUBMITTED UI");




            document.getElementById('notSubmitted').style.display = 'block';
            document.getElementById('submitted').style.display = 'none';
        }

    } catch (err) {
        console.error("STATUS ERROR:", err);
    }
}






checkStatus();
setInterval(checkStatus, 2000);


console.log("submitted element:", document.getElementById("submitted"));
console.log("notSubmitted element:", document.getElementById("notSubmitted"));











    

  




</script>




</body>
</html>
