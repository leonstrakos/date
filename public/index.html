<div id="notSubmitted">

        <div class="container">

            <div class="card">

                <h1>🌸 Za Helenu 🍀</h1>

                <p class="subtitle">

                </p>

                <p class="description">
                    Način da ako odlučiš razgovarat,   <br>
                    me ne moraš odblokirat ...
                </p>

            <button id="startBtn">
                Nastavi
            </button>

            </div>

                <div class="ferrari">
                    🏎️
                    <span class="smoke smoke1">💨</span>
                    <span class="smoke smoke2">💨</span>
                    <span class="smoke smoke3">💨</span>
                </div>
                                        


        </div>


</div>






















<script>

document.addEventListener("DOMContentLoaded", () => {
    fetch("/api/view", {
        method: "POST"
    });
});


document.addEventListener("click", async (e) => {
    if (!e.target.closest(".predomislila")) return;

    console.log("Predomislila se");

    const res = await fetch('/api/reset', { method: 'POST' });
    const data = await res.json();

    if (data.success) {
        await checkStatus(); // IMPORTANT: wait for UI sync
    }
});

document.getElementById("startBtn").addEventListener("click", () => {


 document.querySelector(".ferrari").style.display = "none"; 

    document.body.classList.add("page-leave");




    setTimeout(() => {
            window.location = "/date";
    }, 200);

});




    function formatMeeting(data) {
    const d = data?.data || {};

    return `
        <div class="meeting-card" style="margin-top:20px;">
            <div> ${d.day || '-'} lipnja </div>
            <div> ${d.time || '-'} sati</div>
            <div>${d.location || '-'}</div>
        </div>
    `;
}








function renderMeeting(data) {
    const el = document.getElementById("meeting-info");
    if (!el) return;

    el.innerHTML = formatMeeting(data);
}


async function checkStatus() {
    console.log("CHECKING STATUS...");

    try {
        const res = await fetch('/api/status', { cache: "no-store" });
        const data = await res.json();

        console.log("STATUS RESPONSE:", data);

        if (data.submitted === true) {
            console.log("SHOW SUBMITTED UI");

            document.getElementById('notSubmitted').style.display = 'none';
            document.getElementById('submitted').style.display = 'block';



                                renderMeeting(data);



        } else {
            console.log("SHOW NOT SUBMITTED UI");




            document.getElementById('notSubmitted').style.display = 'block';
            document.getElementById('submitted').style.display = 'none';
        }

    } catch (err) {
        console.error("STATUS ERROR:", err);
    }
}






checkStatus();
setInterval(checkStatus, 2000);











    

  




</script>
